apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: v1
  template:
    metadata:
      labels:
        app: aceest
        version: v1
    spec:
      containers:
      - name: aceest
        image: dishaniwilp/aceest-app:v1
        ports:
        - containerPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: v2
  template:
    metadata:
      labels:
        app: aceest
        version: v2
    spec:
      containers:
      - name: aceest
        image: dishaniwilp/aceest-app:v1
        ports:
        - containerPort: 5001