apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-ab-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: A

  template:
    metadata:
      labels:
        app: aceest
        version: A

    spec:
      containers:
      - name: aceest
        image: dishaniwilp/aceest-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        env:
        - name: APP_VERSION
          value: "A"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-ab-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: B

  template:
    metadata:
      labels:
        app: aceest
        version: B

    spec:
      containers:
      - name: aceest
        image: dishaniwilp/aceest-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        env:
        - name: APP_VERSION
          value: "B"